<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Menu — Burger</title>
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
  text-align:center;
}
h1{
  margin:10px 0;
}
model-viewer{
  width:100%;
  height:70vh;
}
button{
  padding:15px;
  font-size:18px;
  border:none;
  background:#00c853;
  color:white;
  border-radius:8px;
  margin-top:10px;
}
</style>
</head>
<body>

<h1>🍔 Burger</h1>

<model-viewer
  src="3Dmodel.glb"
  ar
  ar-modes="webxr scene-viewer quick-look"
  camera-controls
  auto-rotate
  shadow-intensity="1">

  <button slot="ar-button">
    View in your space
  </button>
</model-viewer>

<p>Tap the button to see the burger in AR!</p>

</body>
</html>
