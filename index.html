<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Menu — Product</title>
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
  text-align: center;
}
h1 {
  margin: 20px 0 10px 0;
}
model-viewer {
  width: 90%;
  max-width: 600px;
  height: 70vh;
  margin: 0 auto;
}
button[slot="ar-button"] {
  padding: 15px 20px;
  font-size: 18px;
  border: none;
  background: #00c853;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}
p {
  margin-top: 10px;
  font-size: 16px;
}
</style>
</head>
<body>

<h1>🍽️ AR Product Preview</h1>

<model-viewer
  id="ar-viewer"
  src="pizza.glb"
  ios-src="pizza.usdz"
  ar
  ar-modes="webxr scene-viewer quick-look"
  camera-controls
  auto-rotate
  shadow-intensity="1">

  <button slot="ar-button">View in your space</button>
</model-viewer>

<p>Tap the button to see the product in AR!</p>

</body>
</html>
